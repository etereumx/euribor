<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Euribor Gráfica</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="euribor-2025.js"></script>
  <script src="euribor-2026.js"></script>
  <script src="euribor-chart.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f8f9fa;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1em;
    }
    h1 {
      text-align: center;
      color: #1a237e;
      margin-bottom: 1em;
    }
    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 1em;
      flex-wrap: wrap;
    }
    .tab {
      padding: 0.7em 2em;
      cursor: pointer;
      border: 1px solid #90caf9;
      border-bottom: none;
      background: #e3f2fd;
      color: #1976d2;
      font-size: 1.1em;
      border-radius: 8px 8px 0 0;
      margin: 0 0.2em;
      transition: background 0.2s, color 0.2s;
    }
    .tab.active {
      background: #fff;
      color: #0d47a1;
      font-weight: bold;
      box-shadow: 0 -2px 8px #90caf9;
    }
    #euriborChart {
      width: 100% !important;
      max-width: 100vw;
      height: 350px !important;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px #e3f2fd;
      padding: 1em;
    }
    .view-btn {
      padding: 0.5em 1.2em;
      margin: 0 0.2em;
      border: 1px solid #90caf9;
      background: #e3f2fd;
      color: #1976d2;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .view-btn.active {
      background: #1976d2;
      color: #fff;
      font-weight: bold;
    }
    @media (max-width: 600px) {
      .container {
        padding: 0.5em;
      }
      h1 {
        font-size: 1.3em;
      }
      .tab {
        font-size: 1em;
        padding: 0.5em 1em;
      }
      #euriborChart {
        height: 220px !important;
        padding: 0.2em;
      }
      .view-btn {
        font-size: 0.95em;
        padding: 0.4em 0.7em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gráfica del Euribor</h1>
    <div class="tabs">
      <div id="tab-2026" class="tab">2026</div>
      <div id="tab-2025" class="tab">2025</div>
    </div>
    <div style="text-align:center; margin-bottom:1em;">
      <button id="btn-mensual" class="view-btn active">Mensual</button>
      <button id="btn-diaria" class="view-btn">Diaria</button>
    </div>
    <canvas id="euriborChart" width="800" height="400"></canvas>
  </div>
</body>
</html>
